services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-CU14-ubuntu-22.04
    container_name: crm_bd
    environment:
      ACCEPT_EULA: Y
      SA_PASSWORD: ${DB_PASSWORD}
    networks:
      - crm_bd_network
    volumes:
      - sqlserver_data:/var/opt/mssql
    ports:
      - "${DB_PORT}:1433"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd",
            "-S", "localhost",
            "-U", "sa",
            "-P", "${DB_PASSWORD}",
            "-C",
            "-Q", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s

  backend:
    build: .
    container_name: crm_backend
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - crm_bd_network
    env_file:
      - .env
    ports:
      - "8080:8080"

networks:
  crm_bd_network:
    driver: bridge

volumes:
  sqlserver_data: